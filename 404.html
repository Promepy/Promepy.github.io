<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI for Vizag Hub</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #162033;
        background: #ffffff;
      }

      main {
        max-width: 32rem;
        padding: 2rem;
        line-height: 1.5;
      }

      a {
        color: #2636bf;
      }
    </style>
  </head>
  <body>
    <main id="fallback" hidden>
      <h1>Page not found</h1>
      <p>This page does not exist.</p>
      <p><a href="/">Go home</a></p>
    </main>
    <script>
      (function () {
        var basePath = "/aiForVizag";
        var pathname = window.location.pathname.replace(/\/+$/, "");
        var isAppPath = basePath ? pathname === basePath || pathname.indexOf(basePath + "/") === 0 : true;

        if (!isAppPath) {
          showFallback();
          return;
        }

        fetch(basePath + '/index.html', { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) throw new Error("Could not load app shell.");
            return response.text();
          })
          .then(function (html) {
            document.open();
            document.write(html);
            document.close();
          })
          .catch(showFallback);

        function showFallback() {
          var fallback = document.getElementById("fallback");
          if (fallback) fallback.hidden = false;
        }
      })();
    </script>
  </body>
</html>
