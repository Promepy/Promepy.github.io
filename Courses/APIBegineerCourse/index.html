"/course-frames/05_00-14-33_robot_remote_api.png\",\"timecode\":\"00:14:33\"},{\"id\":\"web-refresh\",\"label\":\"02 - Web\",\"title\":\"URLs, HTTP, clients, and servers\",\"body\":\"The browser is a client. It asks a server for a resource by URL. HTTP carries the request and response details.\",\"image\":\"/course-frames/06_00-18-55_url_http_scheme.png\",\"timecode\":\"00:18:55\"},{\"id\":\"responses\",\"label\":\"03 - Response\",\"title\":\"Responses carry status and metadata\",\"body\":\"Status codes, headers, and body content tell the client what happened and how to interpret the returned representation.\",\"image\":\"/course-frames/07_00-22-32_status_code_response_headers.png\",\"timecode\":\"00:22:32\"}],\"checkpoint\":[{\"id\":\"stateless-http\",\"question\":\"What does it mean that HTTP is stateless?\",\"options\":[{\"id\":\"a\",\"label\":\"Servers are not allowed to send response bodies\"},{\"id\":\"b\",\"label\":\"Each request should contain enough context for the server to handle it\"},{\"id\":\"c\",\"label\":\"Only browsers can make HTTP requests\"},{\"id\":\"d\",\"label\":\"URLs cannot include query parameters\"}],\"correctOptionId\":\"b\",\"explanation\":\"Stateless requests do not depend on hidden conversation state from previous requests.\"}]},{\"id\":\"restful-thinking\",\"number\":\"03\",\"title\":\"RESTful Thinking\",\"shortTitle\":\"REST\",\"icon\":\"search\",\"theme\":\"yellow\",\"summary\":\"Use the scavenger hunt to identify resources, representations, and REST constraints.\",\"image\":\"/course-frames/08_00-24-04_rest_constraint_scavenger_hunt.png\",\"timecode\":\"00:24 - 00:29\",\"lessons\":[{\"id\":\"constraints\",\"label\":\"01 - Constraints\",\"title\":\"REST is an architectural style\",\"body\":\"REST is not a product or protocol. It is a set of constraints for building web APIs around resources.\",\"image\":\"/course-frames/08_00-24-04_rest_constraint_scavenger_hunt.png\",\"timecode\":\"00:24:04\"},{\"id\":\"resources\",\"label\":\"02 - Resources\",\"title\":\"Model things as resources\",\"body\":\"Photo apps have users, photos, comments, and likes. REST asks us to identify those resources and represent them clearly.\",\"image\":\"/course-frames/09_00-26-12_rest_resources_photo_model.png\",\"timecode\":\"00:26:12\"}],\"checkpoint\":[{\"id\":\"resource-model\",\"question\":\"In a photo sharing app, which item is most clearly a REST resource?\",\"options\":[{\"id\":\"a\",\"label\":\"The color of the submit button\"},{\"id\":\"b\",\"label\":\"A random animation frame\"},{\"id\":\"c\",\"label\":\"A photo with its own identifier and representation\"},{\"id\":\"d\",\"label\":\"The developer's monitor brightness\"}],\"correctOptionId\":\"c\",\"explanation\":\"Resources are identifiable things the API can represent, such as photos, users, and comments.\"}]},{\"id\":\"spotify-exploration\",\"number\":\"04\",\"title\":\"Spotify API Exploration\",\"shortTitle\":\"Spotify\",\"icon\":\"music\",\"theme\":\"green\",\"summary\":\"Read real API docs, inspect JSON, and connect endpoints to resource identifiers.\",\"image\":\"/course-frames/10_00-30-20_spotify_developer_web_api.png\",\"timecode\":\"00:29 - 00:45\",\"lessons\":[{\"id\":\"docs\",\"label\":\"01 - Docs\",\"title\":\"Docs are part of the interface\",\"body\":\"The Spotify developer site shows endpoints, resource paths, authorization expectations, and examples you can run.\",\"image\":\"/course-frames/10_00-30-20_spotify_developer_web_api.png\",\"timecode\":\"00:30:20\"},{\"id\":\"json\",\"label\":\"02 - JSON\",\"title\":\"Read the representation\",\"body\":\"Track IDs, URLs, nested objects, and arrays show how a music resource is represented over the API.\",\"image\":\"/course-frames/11_00-32-50_spotify_track_json_docs.png\",\"timecode\":\"00:32:50\"}],\"checkpoint\":[{\"id\":\"endpoint-reading\",\"question\":\"What should you identify first when reading an API docs example?\",\"options\":[{\"id\":\"a\",\"label\":\"Method, endpoint, required auth, inputs, and response shape\"},{\"id\":\"b\",\"label\":\"Only the website's background color\"},{\"id\":\"c\",\"label\":\"The exact brand font used in the docs\"},{\"id\":\"d\",\"label\":\"Whether the example is fun to pronounce\"}],\"correctOptionId\":\"a\",\"explanation\":\"Good API reading starts with the request contract and expected representation.\"}]},{\"id\":\"curl-request-mechanics\",\"number\":\"05\",\"title\":\"Curl and Request Mechanics\",\"shortTitle\":\"Curl\",\"icon\":\"terminal\",\"theme\":\"blue\",\"summary\":\"Use curl to make requests, pass headers, and see what API docs are actually describing.\",\"image\":\"/course-frames/12_00-47-31_curl_homepage.png\",\"timecode\":\"00:45 - 00:56\",\"lessons\":[{\"id\":\"curl-tool\",\"label\":\"01 - Tool\",\"title\":\"Curl sends requests from the terminal\",\"body\":\"Many API docs include curl because it exposes the request details directly: method, URL, headers, and body.\",\"image\":\"/course-frames/12_00-47-31_curl_homepage.png\",\"timecode\":\"00:47:31\"},{\"id\":\"headers\",\"label\":\"02 - Headers\",\"title\":\"Auth often travels in headers\",\"body\":\"Bearer tokens and API keys are commonly passed as headers so the server can identify the caller.\"}],\"checkpoint\":[{\"id\":\"curl-translation\",\"question\":\"In a curl command, what does an Authorization header usually do?\",\"options\":[{\"id\":\"a\",\"label\":\"It changes the terminal font\"},{\"id\":\"b\",\"label\":\"It guarantees the request is RESTful\"},{\"id\":\"c\",\"label\":\"It tells the API who is making the request or what access is allowed\"},{\"id\":\"d\",\"label\":\"It converts HTML into JSON automatically\"}],\"correctOptionId\":\"c\",\"explanation\":\"Authorization headers carry credentials or tokens that APIs use to authorize access.\"}]},{\"id\":\"twilio-rest-clients\",\"number\":\"06\",\"title\":\"Twilio and REST Clients\",\"shortTitle\":\"Twilio\",\"icon\":\"message\",\"theme\":\"red\",\"summary\":\"Explore SMS APIs through curl, RESTFox, Postman, credentials, environments, and media URLs.\",\"image\":\"/course-frames/13_00-56-24_twilio_intro.png\",\"timecode\":\"00:56 - 01:48\",\"lessons\":[{\"id\":\"twilio-intro\",\"label\":\"01 - SMS\",\"title\":\"Twilio turns messaging into an API\",\"body\":\"The API abstracts telecom complexity into a request you can understand: send this message from this number to that number.\",\"image\":\"/course-frames/15_01-13-50_twilio_api_overview.png\",\"timecode\":\"01:13:50\"},{\"id\":\"restfox\",\"label\":\"02 - Client\",\"title\":\"REST clients make requests reusable\",\"body\":\"RESTFox and Postman let you save endpoints, variables, auth, and bodies so exploration becomes repeatable.\",\"image\":\"/course-frames/16_01-17-52_restfox_workspace.png\",\"timecode\":\"01:17:52\"},{\"id\":\"response-body\",\"label\":\"03 - Response\",\"title\":\"Read the response body\",\"body\":\"The returned JSON confirms message details, links, media fields, and metadata you can use in the next request.\",\"image\":\"/course-frames/17_01-31-37_restfox_response_body.png\",\"timecode\":\"01:31:37\"}],\"checkpoint\":[{\"id\":\"secret-safety\",\"question\":\"Where should private API tokens never be placed?\",\"options\":[{\"id\":\"a\",\"label\":\"In a protected server environment variable\"},{\"id\":\"b\",\"label\":\"In a REST client environment for local experiments\"},{\"id\":\"c\",\"label\":\"In a temporary shell session while testing privately\"},{\"id\":\"d\",\"label\":\"In browser-visible source code or static client bundles\"}],\"correctOptionId\":\"d\",\"explanation\":\"Anything shipped to the browser can be inspected, so private keys do not belong there.\"}]},{\"id\":\"helper-libraries-webhooks\",\"number\":\"07\",\"title\":\"Helper Libraries and Webhooks\",\"shortTitle\":\"Webhooks\",\"icon\":\"webhook\",\"theme\":\"yellow\",\"summary\":\"See how SDKs wrap APIs, then build serverless webhook handlers and TwiML responses.\",\"image\":\"/course-frames/19_01-53-38_twilio_helper_library_install.png\",\"timecode\":\"01:48 - 02:38\",\"lessons\":[{\"id\":\"sdk\",\"label\":\"01 - SDK\",\"title\":\"Helper libraries are APIs too\",\"body\":\"The Twilio helper library gives a friendlier programming interface while still making HTTP API requests underneath.\",\"image\":\"/course-frames/19_01-53-38_twilio_helper_library_install.png\",\"timecode\":\"01:53:38\"},{\"id\":\"serverless\",\"label\":\"02 - Serverless\",\"title\":\"Serverless hosts the handler\",\"body\":\"Twilio Functions host code that receives requests, reads environment variables, and returns a response.\",\"image\":\"/course-frames/14_01-00-38_twilio_setup_serverless.png\",\"timecode\":\"01:00:38\"},{\"id\":\"webhooks\",\"label\":\"03 - Webhook\",\"title\":\"Webhooks reverse the direction\",\"body\":\"Instead of your app polling Twilio, Twilio calls your endpoint when a text message arrives.\",\"image\":\"/course-frames/22_02-28-30_twilio_webhooks_explanation.png\",\"timecode\":\"02:28:30\"}],\"checkpoint\":[{\"id\":\"webhook-flow\",\"question\":\"What is the core idea of a webhook?\",\"options\":[{\"id\":\"a\",\"label\":\"Another service sends your endpoint a request when an event happens\"},{\"id\":\"b\",\"label\":\"The browser refreshes CSS every second\"},{\"id\":\"c\",\"label\":\"A database refuses every insert\"},{\"id\":\"d\",\"label\":\"An SDK stops using APIs\"}],\"correctOptionId\":\"a\",\"explanation\":\"A webhook is event-driven: the external service calls your URL when something happens.\"}]},{\"id\":\"gallery-rest-review\",\"number\":\"08\",\"title\":\"Photo Gallery API and REST Review\",\"shortTitle\":\"Gallery\",\"icon\":\"gallery\",\"theme\":\"blue\",\"summary\":\"Shape JSON, fetch it from the client, then decide whether the final API is truly RESTful.\",\"image\":\"/course-frames/26_03-00-16_final_burrito_gallery.png\",\"timecode\":\"02:38 - 03:07\",\"lessons\":[{\"id\":\"json-api\",\"label\":\"01 - JSON\",\"title\":\"Shape data for your client\",\"body\":\"The serverless function converts Twilio message/media data into a gallery response the frontend can consume.\",\"image\":\"/course-frames/24_02-40-07_json_api_function.png\",\"timecode\":\"02:40:07\"},{\"id\":\"client-fetch\",\"label\":\"02 - Fetch\",\"title\":\"The browser consumes your API\",\"body\":\"The client uses Fetch to call the API, read JSON, and render submitted photos.\",\"image\":\"/course-frames/25_02-54-38_burrito_json_api_result.png\",\"timecode\":\"02:54:38\"},{\"id\":\"rest-review\",\"label\":\"03 - Review\",\"title\":\"RESTful is a checklist, not a vibe\",\"body\":\"Client-server and stateless are present, but uniform interface and HATEOAS expose important gaps in the final project API.\",\"image\":\"/course-frames/28_03-04-25_hateoas_constraint_card.png\",\"timecode\":\"03:04:25\"}],\"checkpoint\":[{\"id\":\"restful-judgement\",\"question\":\"Why is the course gallery API not fully RESTful?\",\"options\":[{\"id\":\"a\",\"label\":\"It returns JSON, and REST APIs cannot return JSON\"},{\"id\":\"b\",\"label\":\"It lacks parts of the uniform interface, including resource links and manipulation\"},{\"id\":\"c\",\"label\":\"It uses a browser client\"},{\"id\":\"d\",\"label\":\"It has a serverless function\"}],\"correctOptionId\":\"b\",\"explanation\":\"The final review calls out missing resource identification/manipulation and HATEOAS links.\"}]}]}}],[\"$L5\",\"$L6\"],\"$L7\"]}],{},null,false,null]},null,false,\"$@8\"]},null,false,null],\"$L9\",false]],\"m\":\"$undefined\",\"G\":[\"$a\",[\"$Lb\"]],\"S\":true,\"h\":null,\"s\":\"$undefined\",\"l\":\"$undefined\",\"p\":\"$undefined\",\"d\":\"$undefined\",\"b\":\"V4wfKUS_PJgBVeeu1SFcn\"}\n"])</script><script>self.__next_f.push([1,"c:I[97367,[\"/Courses/_next/static/chunks/158myu8e_yme3.js\"],\"OutletBoundary\"]\nd:\"$Sreact.suspense\"\n10:I[97367,[\"/Courses/_next/static/chunks/158myu8e_yme3.js\"],\"ViewportBoundary\"]\n12:I[97367,[\"/Courses/_next/static/chunks/158myu8e_yme3.js\"],\"MetadataBoundary\"]\n5:[\"$\",\"
