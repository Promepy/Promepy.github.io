,\"modules\":[{\"id\":\"http-2xx\",\"number\":\"01\",\"title\":\"2xx Success\",\"shortTitle\":\"Success\",\"icon\":\"radio\",\"theme\":\"green\",\"summary\":\"Read data, create data, and clear data successfully.\",\"image\":\"/todo-course-screenshots/course2-http-200-ui-profile-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"status-200\",\"label\":\"200 OK\",\"title\":\"Read a profile successfully\",\"body\":\"The profile request returns HTTP 200 because the server understood the request and sent back the requested representation.\",\"image\":\"/todo-course-screenshots/course2-http-200-ui-profile-browser-pass.png\"},{\"id\":\"status-201\",\"label\":\"201 Created\",\"title\":\"Create an order\",\"body\":\"The order scenario returns HTTP 201 because the request created a new simulated order. The response includes the created order data and a location hint.\",\"image\":\"/todo-course-screenshots/course2-http-201-ui-order-created-browser-pass.png\"},{\"id\":\"status-204\",\"label\":\"204 No Content\",\"title\":\"Clear a notification\",\"body\":\"The notification clear action returns HTTP 204. The server did the work, but there is no response body because the client does not need new data.\",\"image\":\"/todo-course-screenshots/course2-http-204-ui-notification-cleared-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"success-family\",\"question\":\"Which statement best describes the 2xx family?\",\"options\":[{\"id\":\"a\",\"label\":\"The server always failed\"},{\"id\":\"b\",\"label\":\"The client must always log in again\"},{\"id\":\"c\",\"label\":\"The request succeeded, but each code can describe a different kind of success\"},{\"id\":\"d\",\"label\":\"The response body is always required\"}],\"correctOptionId\":\"c\",\"explanation\":\"200, 201, and 204 are all success codes, but they communicate different outcomes.\"}]},{\"id\":\"http-redirect-cache\",\"number\":\"02\",\"title\":\"Redirects And Caching\",\"shortTitle\":\"Redirects\",\"icon\":\"globe\",\"theme\":\"blue\",\"summary\":\"See how clients handle redirects, ETags, and unchanged resources.\",\"image\":\"/todo-course-screenshots/course2-http-302-ui-browser-fetch-caveat.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"status-302\",\"label\":\"302 Found\",\"title\":\"A browser client can hide redirect details\",\"body\":\"The docs redirect scenario is a useful browser lesson: the teaching UI records HTTP 0 because browser Fetch protects cross-origin manual redirect details. The action still teaches that redirects are client navigation signals, not ordinary JSON responses.\",\"image\":\"/todo-course-screenshots/course2-http-302-ui-browser-fetch-caveat.png\",\"callout\":\"Different clients expose redirect details differently. Browser security rules can affect what JavaScript is allowed to see.\"},{\"id\":\"etag-200\",\"label\":\"200 With ETag\",\"title\":\"First read returns the cache tag\",\"body\":\"The first cached-profile request returns HTTP 200 and an ETag. The ETag is a version label the client can send later to ask whether the resource changed.\",\"image\":\"/todo-course-screenshots/course2-http-200-ui-etag-cache-primer-browser-pass.png\"},{\"id\":\"status-304\",\"label\":\"304 Not Modified\",\"title\":\"The cached copy is still valid\",\"body\":\"The second cached-profile request sends If-None-Match. The server returns HTTP 304 with no body because the client can reuse its existing cached copy.\",\"image\":\"/todo-course-screenshots/course2-http-304-ui-not-modified-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"cache-304\",\"question\":\"What does 304 tell the client?\",\"options\":[{\"id\":\"a\",\"label\":\"The resource has not changed, so the cached copy can be reused\"},{\"id\":\"b\",\"label\":\"The user typed invalid JSON\"},{\"id\":\"c\",\"label\":\"The server created a new order\"},{\"id\":\"d\",\"label\":\"The account is missing a token\"}],\"correctOptionId\":\"a\",\"explanation\":\"304 Not Modified avoids resending a body when the client's cached representation is still current.\"}]},{\"id\":\"http-auth-input-errors\",\"number\":\"03\",\"title\":\"Bad Input And Auth\",\"shortTitle\":\"Auth Errors\",\"icon\":\"terminal\",\"theme\":\"red\",\"summary\":\"Separate malformed client input from missing login and missing permission.\",\"image\":\"/todo-course-screenshots/course2-http-400-ui-bad-checkout-request-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"status-400\",\"label\":\"400 Bad Request\",\"title\":\"Checkout input is incomplete\",\"body\":\"The checkout request has a bad quantity and missing required data. HTTP 400 means the client should fix the request before trying again.\",\"image\":\"/todo-course-screenshots/course2-http-400-ui-bad-checkout-request-browser-pass.png\"},{\"id\":\"status-401\",\"label\":\"401 Unauthorized\",\"title\":\"The token is missing\",\"body\":\"The account request returns HTTP 401 because the server needs authentication and did not receive a valid bearer token.\",\"image\":\"/todo-course-screenshots/course2-http-401-ui-missing-token-browser-pass.png\"},{\"id\":\"status-403\",\"label\":\"403 Forbidden\",\"title\":\"Logged in is not the same as allowed\",\"body\":\"The admin report request is made while logged in as a learner. HTTP 403 means the server knows who the user is, but that user is not allowed to access the resource.\",\"image\":\"/todo-course-screenshots/course2-http-403-ui-authenticated-forbidden-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"401-vs-403\",\"question\":\"What is the clearest difference between 401 and 403?\",\"options\":[{\"id\":\"a\",\"label\":\"401 means success; 403 means created\"},{\"id\":\"b\",\"label\":\"401 only happens in databases; 403 only happens in browsers\"},{\"id\":\"c\",\"label\":\"There is no meaningful difference\"},{\"id\":\"d\",\"label\":\"401 means authentication is missing or invalid; 403 means authenticated but not allowed\"}],\"correctOptionId\":\"d\",\"explanation\":\"401 asks for valid authentication; 403 says the authenticated caller lacks permission.\"}]},{\"id\":\"http-state-validation\",\"number\":\"04\",\"title\":\"Missing, Conflicting, Unsupported\",\"shortTitle\":\"Validation\",\"icon\":\"search\",\"theme\":\"yellow\",\"summary\":\"Use concrete client mistakes to understand 404, 409, 415, and 422.\",\"image\":\"/todo-course-screenshots/course2-http-404-ui-package-not-found-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"status-404\",\"label\":\"404 Not Found\",\"title\":\"The package does not exist\",\"body\":\"The package lookup uses an ID the server cannot find. HTTP 404 means the requested resource is not available at that path or identifier.\",\"image\":\"/todo-course-screenshots/course2-http-404-ui-package-not-found-browser-pass.png\"},{\"id\":\"status-409\",\"label\":\"409 Conflict\",\"title\":\"The seat is already reserved\",\"body\":\"The seat reservation request is shaped correctly, but it conflicts with current state because seat A1 is already taken.\",\"image\":\"/todo-course-screenshots/course2-http-409-ui-seat-conflict-browser-pass.png\"},{\"id\":\"status-415\",\"label\":\"415 Unsupported Media Type\",\"title\":\"The upload format is not accepted\",\"body\":\"The upload endpoint only accepts a supported file type for the lesson. HTTP 415 points at the request format or content type.\",\"image\":\"/todo-course-screenshots/course2-http-415-ui-unsupported-upload-browser-pass.png\"},{\"id\":\"status-422\",\"label\":\"422 Unprocessable Content\",\"title\":\"The JSON is valid but the value breaks a rule\",\"body\":\"The profile request contains valid JSON, but age 9 violates the business rule that age must be at least 13.\",\"image\":\"/todo-course-screenshots/course2-http-422-ui-profile-semantic-validation-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"422-meaning\",\"question\":\"Why is 422 different from 400 in these lessons?\",\"options\":[{\"id\":\"a\",\"label\":\"The server created a new resource\"},{\"id\":\"b\",\"label\":\"The JSON can be valid, but the values fail a business rule\"},{\"id\":\"c\",\"label\":\"The client must use a cached copy\"},{\"id\":\"d\",\"label\":\"The request always has no body\"}],\"correctOptionId\":\"b\",\"explanation\":\"422 is useful when syntax is understandable but semantic validation fails.\"}]},{\"id\":\"http-limits-server\",\"number\":\"05\",\"title\":\"Rate Limits And Server Problems\",\"shortTitle\":\"Server Side\",\"icon\":\"webhook\",\"theme\":\"red\",\"summary\":\"Learn when the client should wait, retry later, or contact the API owner.\",\"image\":\"/todo-course-screenshots/course2-http-429-ui-rate-limit-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"status-429\",\"label\":\"429 Too Many Requests\",\"title\":\"The client is calling too often\",\"body\":\"The rate-limit scenario returns HTTP 429 with Retry-After: 30. The correct client action is to wait before retrying.\",\"image\":\"/todo-course-screenshots/course2-http-429-ui-rate-limit-browser-pass.png\"},{\"id\":\"status-500\",\"label\":\"500 Internal Server Error\",\"title\":\"The report failed unexpectedly\",\"body\":\"The report scenario returns HTTP 500. This is a server-side failure: the request may be fine, but the server could not complete the work.\",\"image\":\"/todo-course-screenshots/course2-http-500-ui-report-failure-browser-pass.png\"},{\"id\":\"status-503\",\"label\":\"503 Service Unavailable\",\"title\":\"The service is temporarily unavailable\",\"body\":\"The maintenance scenario returns HTTP 503 with Retry-After: 60. Unlike a generic 500, this suggests the outage is temporary and retry timing matters.\",\"image\":\"/todo-course-screenshots/course2-http-503-ui-maintenance-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"retry-after\",\"question\":\"Which two screenshots show Retry-After as a practical hint?\",\"options\":[{\"id\":\"a\",\"label\":\"201 order and 204 notification\"},{\"id\":\"b\",\"label\":\"404 package and 409 seat\"},{\"id\":\"c\",\
