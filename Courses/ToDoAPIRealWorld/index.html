ndefined\",\"unauthorized\":\"$undefined\"}]}]}]]}],{\"children\":[[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L2\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L3\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[[\"$\",\"$1\",\"c\",{\"children\":[[\"$\",\"$L4\",null,{\"course\":{\"id\":\"todo-api-real-world\",\"title\":\"Real World API Usage With a ToDo API\",\"shortTitle\":\"ToDo API\",\"shelfTitle\":\"Real World ToDo API\",\"folder\":\"ToDoAPIRealWorld\",\"greeting\":\"hey builder,\",\"heroLine1\":\"USE AN\",\"heroAccent\":\"API\",\"heroLine2\":\"FOR REAL\",\"description\":\"A hands-on course where every lesson is backed by the live ToDo frontend, real API requests, real HTTP responses, and visible SQLite evidence where it helps.\",\"moduleHeading\":\"THE TODO\",\"moduleHeadingAccent\":\"API FLOW\",\"modules\":[{\"id\":\"todo-api-setup\",\"number\":\"01\",\"title\":\"Connect To The API\",\"shortTitle\":\"Connection\",\"icon\":\"globe\",\"theme\":\"blue\",\"summary\":\"Point the browser client at the ngrok API and prove the frontend can call it.\",\"image\":\"/todo-course-screenshots/preflight-ui-200-profile-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"base-url\",\"label\":\"01 - Base URL\",\"title\":\"The frontend needs the API address\",\"body\":\"The API base URL tells the browser where the server lives. In this run, the hosted frontend points to the ngrok API base path and then uses that same address for every request.\",\"image\":\"/todo-course-screenshots/preflight-ui-200-profile-browser-pass.png\",\"callout\":\"The browser is not the API. It is a client that sends requests to the API.\"},{\"id\":\"request-inspector\",\"label\":\"02 - Inspector\",\"title\":\"Read the request like a receipt\",\"body\":\"The request inspector shows method, path, URL, headers, request body, response status, and response body. This is the evidence trail for each action.\",\"image\":\"/todo-course-screenshots/preflight-ui-200-profile-inspector.png\"},{\"id\":\"reset\",\"label\":\"03 - Clean Slate\",\"title\":\"Reset before a clean lesson run\",\"body\":\"The instructor reset returned HTTP 204, meaning the server completed the cleanup and has no response body to show. The course notes that demo data is cleared after this action.\",\"image\":\"/todo-course-screenshots/course1-module0-ui-reset-demo-204-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"api-client\",\"question\":\"In this setup, what is the browser frontend doing?\",\"options\":[{\"id\":\"a\",\"label\":\"Acting as a client that sends HTTP requests to the API\"},{\"id\":\"b\",\"label\":\"Replacing the Flask server\"},{\"id\":\"c\",\"label\":\"Editing the SQLite file directly\"},{\"id\":\"d\",\"label\":\"Turning every request into a database screenshot\"}],\"correctOptionId\":\"a\",\"explanation\":\"The frontend calls the API over HTTP; the API owns the server behavior and database writes.\"}]},{\"id\":\"todo-api-register\",\"number\":\"02\",\"title\":\"Create An Account\",\"shortTitle\":\"Register\",\"icon\":\"radio\",\"theme\":\"green\",\"summary\":\"Send account details, create a user, and see what happens when the same user already exists.\",\"image\":\"/todo-course-screenshots/course1-module2-ui-register-201-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"register-201\",\"label\":\"01 - Create\",\"title\":\"POST creates a new user\",\"body\":\"The browser sends user ID, display name, and password to the register endpoint. The server returns HTTP 201 because a new user resource was created.\",\"image\":\"/todo-course-screenshots/course1-module2-ui-register-201-browser-pass.png\",\"callout\":\"201 Created is a success response with a stronger meaning than plain 200: something new now exists.\"},{\"id\":\"user-row\",\"label\":\"02 - Database\",\"title\":\"The API writes to SQLite\",\"body\":\"After registration, the users table contains a new row for the learner. The password is stored as a hash, not as the original plain text password.\",\"image\":\"/todo-course-screenshots/course1-module2-db-user-created-after-register-201.png\"},{\"id\":\"duplicate-409\",\"label\":\"03 - Conflict\",\"title\":\"The same user cannot be created twice\",\"body\":\"Repeating the same registration sends a valid request, but it conflicts with existing server state. The API returns HTTP 409 instead of creating a duplicate user.\",\"image\":\"/todo-course-screenshots/course1-module2-ui-duplicate-register-409-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"register-status\",\"question\":\"Why did duplicate registration return 409?\",\"options\":[{\"id\":\"a\",\"label\":\"The request conflicted with an existing user ID\"},{\"id\":\"b\",\"label\":\"The server could not understand JSON\"},{\"id\":\"c\",\"label\":\"The learner was not logged in yet\"},{\"id\":\"d\",\"label\":\"The database file was deleted\"}],\"correctOptionId\":\"a\",\"explanation\":\"409 means the request clashes with current server state, such as an already-used user ID.\"}]},{\"id\":\"todo-api-login\",\"number\":\"03\",\"title\":\"Login And Token\",\"shortTitle\":\"Login\",\"icon\":\"terminal\",\"theme\":\"blue\",\"summary\":\"Turn a password login into a bearer token session and use it for protected requests.\",\"image\":\"/todo-course-screenshots/course1-module3-ui-login-token-and-list-200-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"login-200\",\"label\":\"01 - Authenticate\",\"title\":\"Login returns a token\",\"body\":\"The login request checks the password and returns HTTP 200 with a token. The frontend stores that token for later API calls during the browser session.\",\"image\":\"/todo-course-screenshots/course1-module3-ui-login-token-and-list-200-browser-pass.png\"},{\"id\":\"session-row\",\"label\":\"02 - Session\",\"title\":\"The server remembers the session safely\",\"body\":\"The database records a session row connected to the user. The token shown to the client is not something learners should treat as a password; it is a temporary proof of login.\",\"image\":\"/todo-course-screenshots/course1-module3-db-login-token-and-session-record.png\"},{\"id\":\"protected-list\",\"label\":\"03 - Protected GET\",\"title\":\"Listing todos requires login\",\"body\":\"After login, the browser can call the protected todos endpoint. The response is HTTP 200, and an empty list still counts as a successful response.\",\"image\":\"/todo-course-screenshots/course1-module3-ui-login-token-and-list-200-browser-pass.png\",\"callout\":\"A successful list request can return zero items. Empty data is different from an error.\"}],\"checkpoint\":[{\"id\":\"token-purpose\",\"question\":\"What is the token used for after login?\",\"options\":[{\"id\":\"a\",\"label\":\"To prove the browser is allowed to call protected endpoints\"},{\"id\":\"b\",\"label\":\"To rename the database table\"},{\"id\":\"c\",\"label\":\"To hide the HTTP status code\"},{\"id\":\"d\",\"label\":\"To make every endpoint public\"}],\"correctOptionId\":\"a\",\"explanation\":\"The browser sends the token with protected API requests so the server can authorize them.\"}]},{\"id\":\"todo-api-create-list\",\"number\":\"04\",\"title\":\"Create And Read Todos\",\"shortTitle\":\"Create\",\"icon\":\"message\",\"theme\":\"yellow\",\"summary\":\"Create a todo item, watch the UI refresh, and confirm the new row in SQLite.\",\"image\":\"/todo-course-screenshots/course1-module4-ui-create-todo-201-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"create-201\",\"label\":\"01 - POST Todo\",\"title\":\"A todo is created with POST\",\"body\":\"The frontend sends a title and description to the todos endpoint. The request history captures POST /todos returning 201, then the UI refreshes the list with a GET.\",\"image\":\"/todo-course-screenshots/course1-module4-ui-create-todo-201-browser-pass.png\",\"callout\":\"Many UIs perform a second read after a create so the screen matches the server.\"},{\"id\":\"todo-row\",\"label\":\"02 - Stored Row\",\"title\":\"The created todo is now data\",\"body\":\"The todos table shows the new item with its owner, title, description, completion state, and timestamps. This is the server-side result of the API call.\",\"image\":\"/todo-course-screenshots/course1-module4-db-todo-created-row.png\"},{\"id\":\"list-200\",\"label\":\"03 - GET Todos\",\"title\":\"Reading returns the current list\",\"body\":\"A GET request asks for the user's current todos. The server returns HTTP 200 with the latest representation of the list.\",\"image\":\"/todo-course-screenshots/course1-module4-ui-create-todo-201-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"post-get\",\"question\":\"Why can a create action show both POST /todos and GET /todos?\",\"options\":[{\"id\":\"a\",\"label\":\"The UI creates the item, then reads the updated list\"},{\"id\":\"b\",\"label\":\"The server failed and retried randomly\"},{\"id\":\"c\",\"label\":\"GET is the only method that can create data\"},{\"id\":\"d\",\"label\":\"The browser cannot show POST requests\"}],\"correctOptionId\":\"a\",\"explanation\":\"The POST changes state, and the follow-up GET refreshes what the learner sees.\"}]},{\"id\":\"todo-api-update\",\"number\":\"05\",\"title\":\"Update A Todo\",\"shortTitle\":\"Update\",\"icon\":\"search\",\"theme\":\"green\",\"summary\":\"Toggle completion and understand how PATCH changes part of an existing resource.\",\"image\":\"/todo-course-screenshots/course1-module5-ui-toggle-todo-200-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"patch-200\",\"label\":\"01 - PATCH\",\"title\":\"PATCH updates part of a todo\",\"body\":\"Clicking the checkbox sends a PATCH request for one todo. The server returns HTTP 200 with the updated state because the resource still exists and now has new values.\",\"image\":\"/todo-course-screenshots/course1-module5-ui-toggle-todo-200-browser-pass.png\"},{\"id\":\"completed-row\",\"label\":\"02 - Verified\",\"title\":\"The database row changes too\",\"body\":\"SQLite shows the todo as completed after the API call. This connects the visible checkbox to a real persistent change on the server.\",\"image\":\"/todo-course-screenshots/course1-module5-db-todo-completed-row.png\"}],\"checkpoint\":[{\"id\":\"patch-meaning\",\"question\":\"What does PATCH mean in this todo lesson?\",\"options\":[{\"id\":\"a\",\"label\":\"Change part of an existing todo\"},{\"id\":\"b\",\"label\":\"Create a brand new account\"},{\"id\":\"c\",\"label\":\"Delete every todo\"},{\"id\":\"d\",\"label\":\"Ask whether the API is online\"}],\"correctOptionId\":\"a\",\"explanation\":\"PATCH is used for a partial update, such as changing a completed flag.\"}]},{\"id\":\"todo-api-delete-logout\",\"number\":\"06\",\"title\":\"Delete And Logout\",\"shortTitle\":\"Delete\",\"icon\":\"webhook\",\"theme\":\"red\",\"summary\":\"Remove a todo, see why 204 has no body, and end the session cleanly.\",\"image\":\"/todo-course-screenshots/course1-module6-ui-delete-todo-204-browser-pass.png\",\"timecode\":\"Live UI\",\"lessons\":[{\"id\":\"delete-204\",\"label\":\"01 - DELETE\",\"title\":\"Delete succeeds with no response body\",\"body\":\"The delete action returns HTTP 204. That means the server completed the action successfully and intentionally has no JSON body to display.\",\"image\":\"/todo-course-screenshots/course1-module6-ui-delete-todo-204-browser-pass.png\"},{\"id\":\"empty-table\",\"label\":\"02 - Removed\",\"title\":\"The todo row is gone\",\"body\":\"The database proof shows the todo no longer appears in the table. The API action changed the stored state, not just the screen.\",\"image\":\"/todo-course-screenshots/course1-module6-db-todo-deleted-empty.png\"},{\"id\":\"logout-204\",\"label\":\"03 - Logout\",\"title\":\"Logout also returns 204\",\"body\":\"Logging out invalidates the session and returns HTTP 204. The browser then returns to the signed-out UI.\",\"image\":\"/todo-course-screenshots/course1-module6-ui-logout-204-browser-pass.png\"}],\"checkpoint\":[{\"id\":\"delete-status\",\"question\":\"Why is 204 a good response for delete or logout?\",\"options\":[{\"id\":\"a\",\"label\":\"The action succeeded and there is no useful body to return\"},{\"id\":\"b\",\"label\":\"The action failed silently\"},{\"id\":\"c\",\"label\":\"The server wants the client to upload a file\"},{\"id\":\"d\",\"label\":\"The client is not authenticated\"}],\"correctOptionId\":\"a\",\"explanation\":\"204 No Content is still success; it simply carries no response body.\"}]}]}}],[\"$L5\",\"$L6\"],\"$L7\"]}],{},null,false,null]},null,false,\"$@8\"]},null,false,null],\"$L9\",false]],\"m\":\"$undefined\",\"G\":[\"$a\",[\"$Lb\"]],\"S\":true,\"h\":null,\"s\":\"$undefined\",\"l\":\"$undefined\",\"p\":\"$undefined\",\"d\":\"$undefined\",\"b\":\"yF_7mbgA1yr7r_stfr2zI\"}\n"])</script><script>self.__next_f.push([1,"c:I[97367,[\"/Courses/_next/static/chunks/158myu8e_yme3.js\"],\"OutletBoundary\"]\nd:\"$Sreact.suspense\"\n10:I[97367,[\"/Courses/_next/static/chunks/158myu8e_yme3.js\"],\"ViewportBoundary\"]\n12:I[97367,[\"/Courses/_next/static/chunks/158myu8e_yme3.js\"],\"MetadataBoundary\"]\n5:[\"$\",\"script\",\"script-0\",{\"src\":\"/Courses/_next/static/chunks/1o9f_89lgs_kh.js\",\"async\":true,\"nonce\":\"$undefined\"}]\n6:[\"$\",\"script\",\"script-1\",{\"src\":\"/Courses/_next/static/chunks/0xtkmxajiemgc.js\",\"async\":true,\"nonce\":\"$undefined\"}]\n7:[\"$\",\"$Lc\",null,{\"children\":[\"$\",\"$d\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@e\"}]}]\nf:[]\n8:\"$Wf\"\n9:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L10\",null,{\"children\":\"$L11\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L12\",null,{\"children\":[\"$\",\"$d\",null,{\"name\":\"Next.Metadata\",\"children\"
