<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Bits travel through copper, fibre, and radio</title>
  <desc id="desc">Three side-by-side paths show bits represented as electrical pulses in copper, flashes of light in fibre, and electromagnetic waves through the air, followed by a comparison of bandwidth and latency.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#0B1F33" stroke-opacity=".055"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0B1F33" flood-opacity=".13"/></filter>
  </defs>
  <rect width="1200" height="675" rx="28" fill="#F7F1E3"/><rect width="1200" height="675" rx="28" fill="url(#grid)"/>
  <path d="M34 112H1166" stroke="#0B1F33" stroke-width="3" stroke-linecap="round"/>
  <text x="44" y="62" fill="#0B1F33" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="3">02 · TRANSMIT</text>
  <text x="44" y="98" fill="#0B1F33" font-family="Arial, sans-serif" font-size="31" font-weight="800">The same bits, carried three ways</text>
  <g transform="rotate(-2 1035 70)">
    <rect x="952" y="38" width="194" height="55" rx="10" fill="#F2C94C" stroke="#0B1F33" stroke-width="3"/>
    <text x="1049" y="74" text-anchor="middle" fill="#0B1F33" font-family="monospace" font-size="23" font-weight="700">1 0 1 1 0 1</text>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif" fill="#0B1F33">
    <rect x="45" y="153" width="350" height="382" rx="22" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
    <circle cx="91" cy="202" r="24" fill="#F2C94C" stroke="#0B1F33" stroke-width="3"/>
    <path d="M80 202H102M91 191V213" stroke="#0B1F33" stroke-width="4" stroke-linecap="round"/>
    <text x="128" y="200" font-size="26" font-weight="800">Copper cable</text>
    <text x="128" y="226" font-size="17" font-weight="700" letter-spacing="1">ELECTRICAL PULSES</text>
    <path d="M79 295H110V258H151V331H194V274H238V315H281V252H323V295H360" fill="none" stroke="#F47B6A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M76 355C141 334 254 374 363 349" fill="none" stroke="#B26B3F" stroke-width="18" stroke-linecap="round"/>
    <path d="M76 355C141 334 254 374 363 349" fill="none" stroke="#F2C94C" stroke-width="5" stroke-linecap="round" stroke-dasharray="7 10"/>
    <rect x="72" y="407" width="296" height="88" rx="14" fill="#FFF6D1"/>
    <text x="91" y="438" font-size="18" font-weight="800">Useful for:</text>
    <text x="91" y="466" font-size="17">Ethernet and short local links</text>
    <text x="91" y="489" font-size="15" fill="#466075">Can pick up electrical interference</text>

    <rect x="425" y="153" width="350" height="382" rx="22" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
    <circle cx="471" cy="202" r="24" fill="#38BDF8" stroke="#0B1F33" stroke-width="3"/>
    <path d="M461 211L478 193M463 193L479 209" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <text x="508" y="200" font-size="26" font-weight="800">Fibre-optic</text>
    <text x="508" y="226" font-size="17" font-weight="700" letter-spacing="1">FLASHES OF LIGHT</text>
    <rect x="461" y="258" width="278" height="91" rx="45" fill="#D9F1FB" stroke="#0B1F33" stroke-width="3"/>
    <path d="M486 304L516 276 548 330 581 276 614 330 647 276 680 330 714 300" fill="none" stroke="#38BDF8" stroke-width="9" stroke-linejoin="round"/>
    <circle cx="487" cy="304" r="9" fill="#F2C94C"/><circle cx="714" cy="300" r="9" fill="#F2C94C"/>
    <path d="M461 368H739" stroke="#0B1F33" stroke-width="5" stroke-linecap="round"/>
    <path d="M494 368H706" stroke="#5FBF90" stroke-width="13" stroke-linecap="round"/>
    <rect x="452" y="407" width="296" height="88" rx="14" fill="#E3F6EC"/>
    <text x="471" y="438" font-size="18" font-weight="800">Useful for:</text>
    <text x="471" y="466" font-size="17">Fast, long-distance backbone links</text>
    <text x="471" y="489" font-size="15" fill="#466075">High capacity and low signal loss</text>

    <rect x="805" y="153" width="350" height="382" rx="22" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
    <circle cx="851" cy="202" r="24" fill="#5FBF90" stroke="#0B1F33" stroke-width="3"/>
    <circle cx="851" cy="210" r="5" fill="#0B1F33"/>
    <path d="M840 200Q851 188 862 200M831 191Q851 169 871 191" fill="none" stroke="#0B1F33" stroke-width="4" stroke-linecap="round"/>
    <text x="888" y="200" font-size="26" font-weight="800">Radio</text>
    <text x="888" y="226" font-size="17" font-weight="700" letter-spacing="1">ELECTROMAGNETIC WAVES</text>
    <circle cx="885" cy="307" r="12" fill="#0B1F33"/>
    <path d="M901 307Q937 267 973 307T1045 307T1117 307" fill="none" stroke="#5FBF90" stroke-width="8" stroke-linecap="round"/>
    <path d="M901 339Q937 299 973 339T1045 339T1117 339" fill="none" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" opacity=".7"/>
    <path d="M853 377Q885 345 917 377M835 394Q885 341 935 394" fill="none" stroke="#0B1F33" stroke-width="4" stroke-linecap="round"/>
    <rect x="832" y="407" width="296" height="88" rx="14" fill="#E3F6EC"/>
    <text x="851" y="438" font-size="18" font-weight="800">Useful for:</text>
    <text x="851" y="466" font-size="17">Wi-Fi, mobile, and satellite links</text>
    <text x="851" y="489" font-size="15" fill="#466075">Flexible, but distance and walls matter</text>
  </g>

  <g transform="rotate(1 600 596)" font-family="Arial, sans-serif" fill="#0B1F33">
    <rect x="126" y="565" width="948" height="75" rx="15" fill="#0B1F33" filter="url(#shadow)"/>
    <text x="166" y="598" fill="#FFFFFF" font-size="18" font-weight="800">BANDWIDTH</text>
    <text x="284" y="598" fill="#D9F1FB" font-size="17">how much data can move at once</text>
    <circle cx="600" cy="592" r="6" fill="#F2C94C"/>
    <text x="628" y="598" fill="#FFFFFF" font-size="18" font-weight="800">LATENCY</text>
    <text x="731" y="598" fill="#D9F1FB" font-size="17">how long data takes to arrive</text>
    <text x="600" y="626" text-anchor="middle" fill="#5FBF90" font-size="15" font-weight="700">The medium influences both—but they measure different things.</text>
  </g>
</svg>
