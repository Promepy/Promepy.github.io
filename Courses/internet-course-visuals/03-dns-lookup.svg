<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">How DNS turns a domain name into an IP address</title>
  <desc id="desc">A four-step flow shows a browser checking its cache, asking a DNS resolver, the resolver consulting root, top-level-domain, and authoritative servers, and the IP address returning so the browser can connect.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#0B1F33" stroke-opacity=".055"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0B1F33" flood-opacity=".13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#0B1F33"/></marker>
  </defs>
  <rect width="1200" height="675" rx="28" fill="#F7F1E3"/><rect width="1200" height="675" rx="28" fill="url(#grid)"/>
  <path d="M34 112H1166" stroke="#0B1F33" stroke-width="3" stroke-linecap="round"/>
  <text x="44" y="62" fill="#0B1F33" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="3">03 · LOOK UP</text>
  <text x="44" y="98" fill="#0B1F33" font-family="Arial, sans-serif" font-size="31" font-weight="800">DNS: the internet’s address book</text>

  <g font-family="Arial, sans-serif" fill="#0B1F33">
    <g filter="url(#shadow)">
      <rect x="40" y="169" width="239" height="150" rx="20" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="74" cy="202" r="18" fill="#F2C94C" stroke="#0B1F33" stroke-width="3"/><text x="74" y="209" text-anchor="middle" font-size="18" font-weight="800">1</text>
      <rect x="66" y="231" width="188" height="41" rx="9" fill="#D9F1FB" stroke="#0B1F33" stroke-width="2"/>
      <text x="160" y="257" text-anchor="middle" font-size="17" font-weight="700">learn.example</text>
      <text x="160" y="301" text-anchor="middle" font-size="17" font-weight="800">Browser checks cache</text>
    </g>
    <path d="M279 244H339" stroke="#0B1F33" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="310" y="224" text-anchor="middle" font-size="14" font-weight="700">not found</text>
    <g filter="url(#shadow)">
      <rect x="348" y="169" width="225" height="150" rx="20" fill="#38BDF8" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="382" cy="202" r="18" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/><text x="382" y="209" text-anchor="middle" font-size="18" font-weight="800">2</text>
      <path d="M399 251H518M409 268H508" stroke="#0B1F33" stroke-width="9" stroke-linecap="round"/>
      <circle cx="389" cy="251" r="6" fill="#FFFFFF"/><circle cx="399" cy="268" r="6" fill="#FFFFFF"/>
      <text x="461" y="301" text-anchor="middle" font-size="17" font-weight="800">Ask DNS resolver</text>
    </g>
    <path d="M573 244H633" stroke="#0B1F33" stroke-width="5" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="642" y="143" width="322" height="202" rx="20" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="678" cy="177" r="18" fill="#F47B6A" stroke="#0B1F33" stroke-width="3"/><text x="678" y="184" text-anchor="middle" font-size="18" font-weight="800">3</text>
      <text x="714" y="184" font-size="18" font-weight="800">Find the authority</text>
      <g text-anchor="middle" font-size="16" font-weight="700">
        <circle cx="705" cy="257" r="43" fill="#FFF6D1" stroke="#0B1F33" stroke-width="3"/><text x="705" y="253">Root</text><text x="705" y="273" font-size="13">“ask .example”</text>
        <circle cx="805" cy="257" r="43" fill="#D9F1FB" stroke="#0B1F33" stroke-width="3"/><text x="805" y="253">TLD</text><text x="805" y="273" font-size="13">“ask owner”</text>
        <circle cx="905" cy="257" r="43" fill="#E3F6EC" stroke="#0B1F33" stroke-width="3"/><text x="905" y="253">Authoritative</text><text x="905" y="273" font-size="13">“here it is”</text>
      </g>
      <path d="M748 257H756M848 257H856" stroke="#0B1F33" stroke-width="4" marker-end="url(#arrow)"/>
      <text x="803" y="327" text-anchor="middle" fill="#466075" font-size="14">The resolver follows referrals and caches the answer.</text>
    </g>
    <path d="M964 244H1024" stroke="#0B1F33" stroke-width="5" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="1033" y="169" width="127" height="150" rx="20" fill="#5FBF90" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="1065" cy="202" r="18" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/><text x="1065" y="209" text-anchor="middle" font-size="18" font-weight="800">4</text>
      <text x="1097" y="250" text-anchor="middle" font-size="15" font-weight="800">IP address</text>
      <text x="1097" y="276" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700">203.0.113.42</text>
      <text x="1097" y="301" text-anchor="middle" font-size="14">returned</text>
    </g>
  </g>

  <path d="M1095 319C1095 405 902 411 902 449" fill="none" stroke="#5FBF90" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M160 319C160 405 298 411 298 449" fill="none" stroke="#38BDF8" stroke-width="6" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)" font-family="Arial, sans-serif" fill="#0B1F33">
    <rect x="164" y="457" width="872" height="144" rx="24" fill="#0B1F33"/>
    <g transform="translate(212 488)">
      <rect width="205" height="75" rx="14" fill="#FFFFFF"/>
      <text x="102" y="32" text-anchor="middle" font-size="16" font-weight="800">Domain name</text>
      <text x="102" y="56" text-anchor="middle" font-size="15">easy for people</text>
    </g>
    <path d="M450 526H548" stroke="#F2C94C" stroke-width="7" marker-end="url(#arrow)"/>
    <text x="499" y="502" text-anchor="middle" fill="#F2C94C" font-size="14" font-weight="800">DNS TRANSLATES</text>
    <g transform="translate(583 488)">
      <rect width="205" height="75" rx="14" fill="#D9F1FB"/>
      <text x="102" y="32" text-anchor="middle" font-size="16" font-weight="800">IP address</text>
      <text x="102" y="56" text-anchor="middle" font-size="15">used by networks</text>
    </g>
    <path d="M821 526H905" stroke="#5FBF90" stroke-width="7" marker-end="url(#arrow)"/>
    <text x="927" y="518" fill="#FFFFFF" font-size="16" font-weight="800">Browser</text>
    <text x="927" y="542" fill="#D9F1FB" font-size="15">connects</text>
  </g>
  <text x="600" y="640" text-anchor="middle" fill="#0B1F33" font-family="Arial, sans-serif" font-size="16" font-weight="700">Cache hits skip the long lookup. DNS spoofing tries to return the wrong address.</text>
</svg>
