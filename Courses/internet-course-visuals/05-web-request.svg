<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">A browser and web server exchange HTTP messages</title>
  <desc id="desc">The browser sends an HTTP GET request for a URL, the server returns a 200 response containing resources, and the browser combines HTML structure, CSS presentation, and JavaScript behavior to render the page.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#0B1F33" stroke-opacity=".055"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0B1F33" flood-opacity=".13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#0B1F33"/></marker>
  </defs>
  <rect width="1200" height="675" rx="28" fill="#F7F1E3"/><rect width="1200" height="675" rx="28" fill="url(#grid)"/>
  <path d="M34 112H1166" stroke="#0B1F33" stroke-width="3" stroke-linecap="round"/>
  <text x="44" y="62" fill="#0B1F33" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="3">05 · REQUEST</text>
  <text x="44" y="98" fill="#0B1F33" font-family="Arial, sans-serif" font-size="31" font-weight="800">The web is a request-and-response conversation</text>

  <g font-family="Arial, sans-serif" fill="#0B1F33">
    <g filter="url(#shadow)">
      <rect x="42" y="158" width="338" height="310" rx="22" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <path d="M42 205H380" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="68" cy="181" r="7" fill="#F47B6A"/><circle cx="91" cy="181" r="7" fill="#F2C94C"/><circle cx="114" cy="181" r="7" fill="#5FBF90"/>
      <rect x="137" y="169" width="219" height="25" rx="12" fill="#D9F1FB"/>
      <path d="M153 182L158 187 168 176" fill="none" stroke="#0B1F33" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="180" y="187" font-size="13" font-weight="700">https://learn.example/guide</text>
      <rect x="72" y="236" width="278" height="52" rx="10" fill="#0B1F33"/>
      <rect x="90" y="253" width="154" height="9" rx="4" fill="#38BDF8"/><rect x="90" y="270" width="102" height="6" rx="3" fill="#FFFFFF" opacity=".75"/>
      <rect x="72" y="306" width="124" height="120" rx="12" fill="#E3F6EC"/>
      <circle cx="134" cy="342" r="21" fill="#5FBF90"/><rect x="91" y="377" width="86" height="7" rx="3" fill="#0B1F33"/><rect x="105" y="393" width="58" height="7" rx="3" fill="#0B1F33" opacity=".5"/>
      <rect x="212" y="306" width="138" height="52" rx="12" fill="#FFF6D1"/><rect x="230" y="325" width="102" height="7" rx="3" fill="#0B1F33"/>
      <rect x="212" y="374" width="138" height="52" rx="12" fill="#FCE2DE"/><rect x="230" y="393" width="74" height="7" rx="3" fill="#0B1F33"/>
      <text x="211" y="452" text-anchor="middle" font-size="18" font-weight="800">Browser renders the page</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="858" y="158" width="300" height="310" rx="22" fill="#38BDF8" stroke="#0B1F33" stroke-width="3"/>
      <text x="1008" y="200" text-anchor="middle" font-size="22" font-weight="800">Web server</text>
      <g fill="#FFFFFF" stroke="#0B1F33" stroke-width="3">
        <rect x="900" y="225" width="216" height="58" rx="11"/><rect x="900" y="300" width="216" height="58" rx="11"/><rect x="900" y="375" width="216" height="58" rx="11"/>
      </g>
      <g fill="#0B1F33">
        <circle cx="927" cy="254" r="7"/><circle cx="927" cy="329" r="7"/><circle cx="927" cy="404" r="7"/>
      </g>
      <g stroke="#0B1F33" stroke-width="7" stroke-linecap="round"><path d="M951 248H1084M951 260H1038M951 323H1084M951 335H1049M951 398H1084M951 410H1027"/></g>
      <text x="1008" y="454" text-anchor="middle" font-size="16" font-weight="700">Runs code · reads data · builds response</text>
    </g>

    <path d="M380 235C494 160 715 160 858 235" fill="none" stroke="#F47B6A" stroke-width="6" marker-end="url(#arrow)"/>
    <g transform="rotate(-1 620 205)" filter="url(#shadow)">
      <rect x="457" y="170" width="327" height="102" rx="14" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <text x="479" y="201" font-family="monospace" font-size="17" font-weight="800">GET /guide HTTP/1.1</text>
      <text x="479" y="229" font-family="monospace" font-size="16">Host: learn.example</text>
      <text x="479" y="253" font-size="14" font-weight="700" fill="#F47B6A">METHOD + PATH + HEADERS</text>
    </g>

    <path d="M858 388C730 493 512 493 380 388" fill="none" stroke="#5FBF90" stroke-width="6" marker-end="url(#arrow)"/>
    <g transform="rotate(1 620 392)" filter="url(#shadow)">
      <rect x="457" y="343" width="327" height="102" rx="14" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <text x="479" y="375" font-family="monospace" font-size="17" font-weight="800">HTTP/1.1 200 OK</text>
      <text x="479" y="403" font-family="monospace" font-size="16">Content-Type: text/html</text>
      <text x="479" y="427" font-size="14" font-weight="700" fill="#2E9867">STATUS + HEADERS + BODY</text>
    </g>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif" fill="#0B1F33" text-anchor="middle">
    <rect x="86" y="522" width="1028" height="101" rx="20" fill="#0B1F33"/>
    <rect x="128" y="545" width="214" height="55" rx="12" fill="#F47B6A"/><text x="235" y="568" font-size="17" font-weight="800">HTML</text><text x="235" y="590" font-size="14">structure</text>
    <text x="371" y="580" fill="#FFFFFF" font-size="26" font-weight="800">+</text>
    <rect x="399" y="545" width="214" height="55" rx="12" fill="#38BDF8"/><text x="506" y="568" font-size="17" font-weight="800">CSS</text><text x="506" y="590" font-size="14">presentation</text>
    <text x="642" y="580" fill="#FFFFFF" font-size="26" font-weight="800">+</text>
    <rect x="670" y="545" width="214" height="55" rx="12" fill="#F2C94C"/><text x="777" y="568" font-size="17" font-weight="800">JavaScript</text><text x="777" y="590" font-size="14">behavior</text>
    <path d="M911 573H964" stroke="#5FBF90" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="1024" y="568" fill="#FFFFFF" font-size="16" font-weight="800">Interactive</text><text x="1024" y="590" fill="#D9F1FB" font-size="15">web page</text>
  </g>
  <text x="600" y="652" text-anchor="middle" fill="#466075" font-family="Arial, sans-serif" font-size="15" font-weight="700">HTTPS protects this conversation in transit; the lock alone does not prove every page is trustworthy.</text>
</svg>
