<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">TLS establishes a secure connection using asymmetric and symmetric cryptography</title>
  <desc id="desc">The server presents a certificate, the browser verifies the domain, asymmetric cryptography helps establish a shared session secret, and both sides then use fast symmetric encryption for private HTTP data.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#0B1F33" stroke-opacity=".055"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0B1F33" flood-opacity=".13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#0B1F33"/></marker>
  </defs>
  <rect width="1200" height="675" rx="28" fill="#F7F1E3"/><rect width="1200" height="675" rx="28" fill="url(#grid)"/>
  <path d="M34 112H1166" stroke="#0B1F33" stroke-width="3" stroke-linecap="round"/>
  <text x="44" y="62" fill="#0B1F33" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="3">06 · SECURE</text>
  <text x="44" y="98" fill="#0B1F33" font-family="Arial, sans-serif" font-size="31" font-weight="800">TLS: verify first, then encrypt the conversation</text>

  <g font-family="Arial, sans-serif" fill="#0B1F33">
    <g filter="url(#shadow)">
      <rect x="51" y="196" width="238" height="266" rx="23" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <rect x="88" y="232" width="164" height="101" rx="11" fill="#D9F1FB" stroke="#0B1F33" stroke-width="3"/>
      <path d="M139 353H201M170 333V353" stroke="#0B1F33" stroke-width="6" stroke-linecap="round"/>
      <circle cx="170" cy="283" r="25" fill="#5FBF90" stroke="#0B1F33" stroke-width="3"/>
      <path d="M159 282L167 290 182 274" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="170" y="392" text-anchor="middle" font-size="21" font-weight="800">Browser</text>
      <text x="170" y="421" text-anchor="middle" font-size="15">wants learn.example</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="911" y="196" width="238" height="266" rx="23" fill="#38BDF8" stroke="#0B1F33" stroke-width="3"/>
      <rect x="951" y="231" width="158" height="55" rx="10" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <rect x="951" y="299" width="158" height="55" rx="10" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="976" cy="258" r="6" fill="#5FBF90"/><circle cx="976" cy="326" r="6" fill="#5FBF90"/>
      <path d="M996 252H1081M996 264H1053M996 320H1081M996 332H1046" stroke="#0B1F33" stroke-width="6" stroke-linecap="round"/>
      <text x="1030" y="392" text-anchor="middle" font-size="21" font-weight="800">Server</text>
      <text x="1030" y="421" text-anchor="middle" font-size="15">holds private credentials</text>
    </g>

    <path d="M911 223C777 125 436 125 289 223" fill="none" stroke="#F47B6A" stroke-width="6" marker-end="url(#arrow)"/>
    <g transform="rotate(-1 600 172)" filter="url(#shadow)">
      <rect x="409" y="133" width="382" height="85" rx="15" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <path d="M443 158H476V190H443Z" fill="#FFF6D1" stroke="#0B1F33" stroke-width="2"/><path d="M451 168H468M451 177H465" stroke="#0B1F33" stroke-width="2"/>
      <text x="497" y="164" font-size="17" font-weight="800">1 · Server sends certificate</text>
      <text x="497" y="190" font-size="15">domain identity + public-key information</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="356" y="250" width="488" height="211" rx="24" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <text x="600" y="282" text-anchor="middle" font-size="18" font-weight="800">2 · Asymmetric handshake</text>
      <g transform="translate(401 307)">
        <circle cx="56" cy="48" r="48" fill="#F2C94C" stroke="#0B1F33" stroke-width="3"/>
        <circle cx="43" cy="43" r="15" fill="none" stroke="#0B1F33" stroke-width="7"/><path d="M55 55L88 88M76 76L86 66M84 84L94 74" stroke="#0B1F33" stroke-width="7" stroke-linecap="round"/>
        <text x="56" y="119" text-anchor="middle" font-size="15" font-weight="800">PUBLIC</text>
        <text x="56" y="139" text-anchor="middle" font-size="13">safe to share</text>
      </g>
      <path d="M512 356H678" stroke="#38BDF8" stroke-width="8" stroke-dasharray="12 9" marker-end="url(#arrow)"/>
      <text x="596" y="338" text-anchor="middle" font-size="14" font-weight="700">agree on a shared secret</text>
      <g transform="translate(687 307)">
        <circle cx="56" cy="48" r="48" fill="#F47B6A" stroke="#0B1F33" stroke-width="3"/>
        <circle cx="43" cy="43" r="15" fill="none" stroke="#0B1F33" stroke-width="7"/><path d="M55 55L88 88M76 76L86 66M84 84L94 74" stroke="#0B1F33" stroke-width="7" stroke-linecap="round"/>
        <text x="56" y="119" text-anchor="middle" font-size="15" font-weight="800">PRIVATE</text>
        <text x="56" y="139" text-anchor="middle" font-size="13">stays secret</text>
      </g>
    </g>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif" fill="#0B1F33">
    <rect x="89" y="501" width="1022" height="123" rx="23" fill="#0B1F33"/>
    <circle cx="151" cy="562" r="36" fill="#5FBF90" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M135 559V548A16 16 0 01167 548V559M130 559H172V585H130Z" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>
    <text x="211" y="545" fill="#5FBF90" font-size="18" font-weight="800">3 · SAME SESSION KEY ON BOTH SIDES</text>
    <text x="211" y="576" fill="#FFFFFF" font-size="18">Fast symmetric encryption protects HTTP data in both directions.</text>
    <text x="211" y="601" fill="#D9F1FB" font-size="15">Anyone intercepting the traffic sees ciphertext—not readable requests and responses.</text>
    <rect x="895" y="532" width="166" height="61" rx="12" fill="#FFFFFF"/>
    <text x="978" y="557" text-anchor="middle" font-family="monospace" font-size="15" font-weight="800">7F A2 19 C8</text>
    <text x="978" y="580" text-anchor="middle" font-size="13">encrypted data</text>
  </g>
  <text x="600" y="651" text-anchor="middle" fill="#466075" font-family="Arial, sans-serif" font-size="15" font-weight="700">HTTPS = HTTP carried through an authenticated, encrypted TLS connection.</text>
</svg>
