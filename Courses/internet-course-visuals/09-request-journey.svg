<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">The complete journey of a web request</title>
  <desc id="desc">Eight numbered cards trace a URL from the browser through cache and DNS, packet routing, TLS security, an HTTP request, server processing, the packetized response, and final browser rendering.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#0B1F33" stroke-opacity=".055"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0B1F33" flood-opacity=".13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#0B1F33"/></marker>
  </defs>
  <rect width="1200" height="675" rx="28" fill="#F7F1E3"/><rect width="1200" height="675" rx="28" fill="url(#grid)"/>
  <path d="M34 112H1166" stroke="#0B1F33" stroke-width="3" stroke-linecap="round"/>
  <text x="44" y="62" fill="#0B1F33" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="3">09 · TRACE</text>
  <text x="44" y="98" fill="#0B1F33" font-family="Arial, sans-serif" font-size="31" font-weight="800">One click, eight connected systems</text>

  <g fill="none" stroke="#0B1F33" stroke-width="5" marker-end="url(#arrow)">
    <path d="M280 232H319"/><path d="M555 232H594"/><path d="M830 232H869"/>
    <path d="M990 312V363"/>
    <path d="M870 453H831"/><path d="M595 453H556"/><path d="M320 453H281"/>
  </g>
  <text x="600" y="343" text-anchor="middle" fill="#466075" font-family="Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2">THERE → AND BACK AGAIN</text>

  <g font-family="Arial, sans-serif" fill="#0B1F33" filter="url(#shadow)">
    <g>
      <rect x="45" y="151" width="235" height="161" rx="20" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="78" cy="184" r="18" fill="#F2C94C" stroke="#0B1F33" stroke-width="3"/><text x="78" y="191" text-anchor="middle" font-size="17" font-weight="800">1</text>
      <text x="108" y="190" font-size="20" font-weight="800">URL + cache</text>
      <rect x="72" y="215" width="181" height="35" rx="9" fill="#FFF6D1" stroke="#0B1F33" stroke-width="2"/>
      <text x="162" y="238" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700">learn.example</text>
      <text x="162" y="276" text-anchor="middle" font-size="14">Browser checks what it knows.</text>
      <text x="162" y="296" text-anchor="middle" font-size="13" fill="#466075">Need an address?</text>
    </g>
    <g>
      <rect x="320" y="151" width="235" height="161" rx="20" fill="#38BDF8" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="353" cy="184" r="18" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/><text x="353" y="191" text-anchor="middle" font-size="17" font-weight="800">2</text>
      <text x="383" y="190" font-size="20" font-weight="800">DNS lookup</text>
      <text x="438" y="230" text-anchor="middle" font-size="16" font-weight="800">name</text>
      <path d="M391 249H485" stroke="#0B1F33" stroke-width="4" marker-end="url(#arrow)"/>
      <text x="438" y="275" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700">203.0.113.42</text>
      <text x="438" y="297" text-anchor="middle" font-size="13">Domain becomes IP address.</text>
    </g>
    <g>
      <rect x="595" y="151" width="235" height="161" rx="20" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="628" cy="184" r="18" fill="#F47B6A" stroke="#0B1F33" stroke-width="3"/><text x="628" y="191" text-anchor="middle" font-size="17" font-weight="800">3</text>
      <text x="658" y="190" font-size="20" font-weight="800">Connect + route</text>
      <g fill="#38BDF8" stroke="#0B1F33" stroke-width="2"><circle cx="642" cy="244" r="14"/><circle cx="712" cy="220" r="14"/><circle cx="784" cy="249" r="14"/></g>
      <path d="M656 240L698 224M726 225L770 244" stroke="#0B1F33" stroke-width="4" stroke-dasharray="7 5"/>
      <text x="712" y="284" text-anchor="middle" font-size="14">Packets cross routers.</text>
      <text x="712" y="303" text-anchor="middle" font-size="13" fill="#466075">Routes can change.</text>
    </g>
    <g>
      <rect x="870" y="151" width="285" height="161" rx="20" fill="#5FBF90" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="903" cy="184" r="18" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/><text x="903" y="191" text-anchor="middle" font-size="17" font-weight="800">4</text>
      <text x="933" y="190" font-size="20" font-weight="800">TLS handshake</text>
      <path d="M975 244V229A20 20 0 011015 229V244M966 244H1024V280H966Z" fill="#FFFFFF" stroke="#0B1F33" stroke-width="4"/>
      <text x="1073" y="238" text-anchor="middle" font-size="14" font-weight="800">verify</text>
      <text x="1073" y="260" text-anchor="middle" font-size="14" font-weight="800">agree keys</text>
      <text x="1073" y="282" text-anchor="middle" font-size="14" font-weight="800">encrypt</text>
      <text x="1012" y="303" text-anchor="middle" font-size="13">Secure channel is ready.</text>
    </g>

    <g>
      <rect x="870" y="373" width="285" height="161" rx="20" fill="#F47B6A" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="903" cy="406" r="18" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/><text x="903" y="413" text-anchor="middle" font-size="17" font-weight="800">5</text>
      <text x="933" y="412" font-size="20" font-weight="800">HTTP request</text>
      <rect x="910" y="437" width="205" height="48" rx="10" fill="#FFFFFF" stroke="#0B1F33" stroke-width="2"/>
      <text x="1012" y="467" text-anchor="middle" font-family="monospace" font-size="16" font-weight="800">GET /guide</text>
      <text x="1012" y="512" text-anchor="middle" font-size="14">Ask the server for a resource.</text>
    </g>
    <g>
      <rect x="595" y="373" width="235" height="161" rx="20" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="628" cy="406" r="18" fill="#F2C94C" stroke="#0B1F33" stroke-width="3"/><text x="628" y="413" text-anchor="middle" font-size="17" font-weight="800">6</text>
      <text x="658" y="412" font-size="20" font-weight="800">Server works</text>
      <g fill="#D9F1FB" stroke="#0B1F33" stroke-width="2"><rect x="628" y="438" width="63" height="55" rx="8"/><rect x="733" y="438" width="63" height="55" rx="8"/></g>
      <text x="660" y="470" text-anchor="middle" font-size="13" font-weight="800">APP</text><text x="765" y="470" text-anchor="middle" font-size="13" font-weight="800">DATA</text>
      <path d="M691 465H724" stroke="#0B1F33" stroke-width="4" marker-end="url(#arrow)"/>
      <text x="712" y="517" text-anchor="middle" font-size="13">Build the response.</text>
    </g>
    <g>
      <rect x="320" y="373" width="235" height="161" rx="20" fill="#38BDF8" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="353" cy="406" r="18" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/><text x="353" y="413" text-anchor="middle" font-size="17" font-weight="800">7</text>
      <text x="383" y="412" font-size="20" font-weight="800">Response returns</text>
      <g text-anchor="middle" font-size="13" font-weight="800">
        <rect x="350" y="439" width="51" height="43" rx="8" fill="#F47B6A" stroke="#0B1F33" stroke-width="2"/><text x="376" y="465">1</text>
        <rect x="412" y="439" width="51" height="43" rx="8" fill="#F2C94C" stroke="#0B1F33" stroke-width="2"/><text x="438" y="465">2</text>
        <rect x="474" y="439" width="51" height="43" rx="8" fill="#5FBF90" stroke="#0B1F33" stroke-width="2"/><text x="500" y="465">3</text>
      </g>
      <text x="438" y="511" text-anchor="middle" font-size="14">Status, headers, and body.</text>
    </g>
    <g>
      <rect x="45" y="373" width="235" height="161" rx="20" fill="#FFFFFF" stroke="#0B1F33" stroke-width="3"/>
      <circle cx="78" cy="406" r="18" fill="#5FBF90" stroke="#0B1F33" stroke-width="3"/><text x="78" y="413" text-anchor="middle" font-size="17" font-weight="800">8</text>
      <text x="108" y="412" font-size="20" font-weight="800">Browser renders</text>
      <rect x="75" y="438" width="175" height="65" rx="9" fill="#D9F1FB" stroke="#0B1F33" stroke-width="2"/>
      <rect x="89" y="451" width="147" height="14" rx="5" fill="#0B1F33"/><rect x="89" y="474" width="64" height="17" rx="5" fill="#F47B6A"/><rect x="161" y="474" width="75" height="17" rx="5" fill="#5FBF90"/>
      <text x="162" y="522" text-anchor="middle" font-size="13">HTML + CSS + JS become pixels.</text>
    </g>
  </g>

  <g transform="rotate(-1 600 596)" filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="82" y="570" width="1036" height="61" rx="16" fill="#0B1F33"/>
    <text x="600" y="596" text-anchor="middle" fill="#F2C94C" font-size="16" font-weight="800">NAME → ADDRESS → ROUTE → SECURE → REQUEST → COMPUTE → RETURN → RENDER</text>
    <text x="600" y="618" text-anchor="middle" fill="#FFFFFF" font-size="14">Each layer solves one problem—and hands the result to the next.</text>
  </g>
  <text x="600" y="654" text-anchor="middle" fill="#466075" font-family="Arial, sans-serif" font-size="14" font-weight="700">Caches may shorten the journey; failures at any layer produce different symptoms.</text>
</svg>
