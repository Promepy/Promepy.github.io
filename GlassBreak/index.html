<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Glass Break Experiment | Gowtham M.</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="legacy-page">
  <main class="site-main">
    <div class="legacy-shell">
      <div class="legacy-card reveal">
        <span class="section-label">Legacy Experiment</span>
        <h1>Glass Break</h1>
        <p class="lead">A preserved interactive experiment from an older phase of the site. Click inside the stage to drop fracture overlays.</p>
      </div>
      <div class="glassbreak-stage reveal" id="glassbreakStage">
        <div class="glassbreak-overlay">
          <p>Click anywhere in the field to trigger a glass-break overlay.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/footer.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    (function () {
      var stage = document.getElementById("glassbreakStage");
      if (!stage) return;

      function getRandomInteger(min, max) {
        return Math.floor(Math.random() * (max - min)) + min;
      }

      stage.addEventListener("click", function (event) {
        var bounds = stage.getBoundingClientRect();
        var x = event.clientX - bounds.left - 200;
        var y = event.clientY - bounds.top - 150;
        var image = document.createElement("img");
        image.className = "glassbreak-fracture";
        image.src = "img/" + getRandomInteger(1, 7) + ".png";
        image.alt = "Glass fracture";
        image.style.left = x + "px";
        image.style.top = y + "px";
        stage.appendChild(image);
      });
    })();
  </script>
</body>
</html>
