<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{POST_TITLE}} | Gowtham M.</title>
  <meta name="description" content="{{POST_DESCRIPTION}}" />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <main class="site-main">
    <section class="page-hero page-hero-dark">
      <div class="container container-narrow">
        <div class="copy-block reveal">
          <a href="../blog/index.html" class="btn btn-ghost">Back to Blog</a>
          <span class="section-label">{{POST_CATEGORY}}</span>
          <h1>{{POST_TITLE}}</h1>
          <p class="lead">{{POST_SUBTITLE}}</p>
          <p class="text-sm text-soft">{{POST_DATE}} · {{READ_TIME}}</p>
        </div>
      </div>
    </section>

    <section class="section section-light">
      <div class="container container-narrow">
        <article class="article-card reveal">
          <div class="article-body">
            {{POST_CONTENT_HTML}}
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/footer.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
