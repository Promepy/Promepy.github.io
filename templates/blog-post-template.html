<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{POST_TITLE}} | Gowtham M.</title>
  <meta name="description" content="{{POST_DESCRIPTION}}" />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <main class="site-main">
    <section class="page-hero">
      <div class="container reveal">
        <a href="../blog/index.html" class="btn btn-ghost" style="margin-bottom:14px;">Back to Blog</a>
        <span class="section-label">{{POST_CATEGORY}}</span>
        <h1>{{POST_TITLE}}</h1>
        <p class="lead">{{POST_SUBTITLE}}</p>
        <p class="text-sm text-soft" style="margin-top:10px;">{{POST_DATE}} - {{READ_TIME}}</p>
      </div>
    </section>

    <section class="section">
      <div class="container" style="max-width:860px;">
        <article class="card reveal" style="line-height:1.8;">
          {{POST_CONTENT_HTML}}
        </article>
      </div>
    </section>
  </main>

  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/footer.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
