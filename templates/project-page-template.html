<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{PROJECT_TITLE}} | Gowtham M.</title>
  <meta name="description" content="{{PROJECT_DESCRIPTION}}" />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <main class="site-main">
    <section class="page-hero">
      <div class="container reveal">
        <a href="../projects.html" class="btn btn-ghost" style="margin-bottom:14px;">Back to Projects</a>
        <span class="badge">{{CATEGORY}}</span>
        <h1 style="margin-top:10px;">{{PROJECT_TITLE}}</h1>
        <p class="lead">{{PROJECT_EXCERPT}}</p>
      </div>
    </section>

    <section class="section">
      <div class="container" style="max-width:900px;">
        <figure class="project-media reveal">
          <img src="../assets/images/projects/placeholders/{{PROJECT_SLUG}}-placeholder.svg" alt="Placeholder visual for {{PROJECT_TITLE}}" loading="lazy" />
          <figcaption>Replace this placeholder with the final project visual.</figcaption>
        </figure>

        <article class="reveal" style="margin-bottom:40px;">
          <span class="section-label">Problem</span>
          <h2>{{PROBLEM_HEADLINE}}</h2>
          <p class="text-muted" style="margin-top:12px;">{{PROBLEM_DETAILS}}</p>
        </article>

        <article class="reveal" style="margin-bottom:40px;">
          <span class="section-label">Solution</span>
          <h2>{{SOLUTION_HEADLINE}}</h2>
          <p class="text-muted" style="margin-top:12px;">{{SOLUTION_DETAILS}}</p>
        </article>

        <article class="reveal">
          <span class="section-label">Impact</span>
          <h2>{{IMPACT_HEADLINE}}</h2>
          <p class="text-muted" style="margin-top:12px;">{{IMPACT_DETAILS}}</p>
        </article>
      </div>
    </section>
  </main>

  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/footer.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
